# zexi 0.4.0
bedrock_prompt_logical_coherence:
  title: Logical coherence prompts;
  title_abbrev: Logical coherence prompts;
  synopsis: Logical coherence prompts using &BR;.
  category: Prompts
  languages:
    Java:
      versions:
        - sdk_version: 2
          github: resources/prompts/amazon_nova_pro
          excerpts:
            - description: Faithfulness – Looks at whether the response contains information not found in the prompt, that cannot be inferred easily from the prompt. Responses are graded a 5-point Likert scale, and then normalized in the output and the job's report card. The {{prompt}} will contain the prompt sent to the generator from your dataset, and the {{prediction}} is the generator model's responses.
              snippet_files:
                - resources/prompts/amazon_nova_pro/faithfulness.txt
            - description: >-
                <b>Score mapping</b></para>
                <itemizedlist>
                    <listitem>
                        <para><b>Snone is faithful:</b> 0</para>
                    </listitem>
                    <listitem>
                        <para><b>some is faithful:</b> 1</para>
                    </listitem>
                    <listitem>
                        <para><b>approximately half is faithful:</b> 2</para>
                    </listitem>
                    <listitem>
                        <para><b>most is faithful:</b> 3</para>
                    </listitem>
                    <listitem>
                        <para><b>all is faithful:</b> 4</para>
                    </listitem>
                </itemizedlist>
              snippet_tags:
                - Bedrock.dotnetv3.BedrockActions.HelloBedroc
  services:
    bedrock: {}
bedrock_prompt_logical_coherence:
  title: Faithfulness prompt;
  title_abbrev: Faithfulness prompt;
  synopsis: Faithfulness prompt using &BR;.
  category: Prompts
  languages:
    Java:
      versions:
        - sdk_version: 2
          github: resources/prompts/amazon_nova_pro
          excerpts:
            - description: Following instructions – Looks at whether the generator model's responses respect the exact directions found in the prompt. Responses are graded a 3-point Likert scale, and then normalized in the output and the job's report card. The {{prompt}} will contain the prompt sent to the generator from your dataset, and the {{prediction}} is the generator model's responses.
              snippet_files:
                - resources/prompts/amazon_nova_pro/faithfulness.txt
            - description: >-
                <b>Score mapping</b></para>
                <itemizedlist>
                    <listitem>
                        <para><b>Snone is faithful:</b> 0</para>
                    </listitem>
                    <listitem>
                        <para><b>some is faithful:</b> 1</para>
                    </listitem>
                    <listitem>
                        <para><b>approximately half is faithful:</b> 2</para>
                    </listitem>
                    <listitem>
                        <para><b>most is faithful:</b> 3</para>
                    </listitem>
                    <listitem>
                        <para><b>all is faithful:</b> 4</para>
                    </listitem>
                </itemizedlist>
              snippet_tags:
                - Bedrock.dotnetv3.BedrockActions.HelloBedroc
  services:
    bedrock: {}
