bedrock_prompt_logical_coherence:
  title: Logical coherence prompts;
  title_abbrev: Logical coherence prompts;
  synopsis: logical coherence prompts using &BR;.
  category: Prompts
  languages:
    Java:
      versions:
        - sdk_version: 2
          github: resources/prompts/amazon_nova_pro
          excerpts:
            - description: Faithfulness – Looks at whether the response contains information not found in the prompt, that cannot be inferred easily from the prompt. Responses are graded a 5-point Likert scale, and then normalized in the output and the job's report card. The {{prompt}} will contain the prompt sent to the generator from your dataset, and the {{prediction}} is the generator model's responses.
              snippet_files:
                - resources/prompts/amazon_nova_pro/faithfulness.txt
            - description: >-
                Score mapping:</para>
                <itemizedlist>
                    <listitem>
                        <para><emphasis role="bold">Sending a text message.</emphasis></para>
                    </listitem>
                    <listitem>
                        <para>Receiving messages synchronously.</para>
                    </listitem>
                    <listitem>
                        <para>Receiving messages asynchronously.</para>
                    </listitem>
                    <listitem>
                        <para>Receiving messages using CLIENT_ACKNOWLEDGE mode.</para>
                    </listitem>
                    <listitem>
                        <para>Receiving messages using the UNORDERED_ACKNOWLEDGE mode.</para>
                    </listitem>
                    <listitem>
                        <para>Using Spring to inject dependencies.</para>
                    </listitem>
                    <listitem>
                        <para>A utility class that provides common methods used by the other examples.</para>
                    </listitem>
                </itemizedlist>
                <para>For more information on using JMS with &SQS;, see the 
                <ulink type="documentation" url="AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-java-message-service-jms-client.html">&SQS; Developer Guide</ulink>.
                </para><para>Sending a text message.
              snippet_tags:
                - javascript.v3.dynamodb.hello
  services:
    bedrock: {}
