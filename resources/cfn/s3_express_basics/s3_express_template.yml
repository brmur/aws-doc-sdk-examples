Resources:
  RegularUser:
    Type: AWS::IAM::User
  ExpressUser:
    Type: AWS::IAM::User
  StandardPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AllowOperations
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - "s3:GetObject"
            Resource: "*"
      Users:
        - !Ref RegularUser
  ExpressPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AllowExpressOperations
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - "s3express:CreateBucket"
              - "s3express:CreateSession"
            Resource: "*"
      Users:
        - !Ref ExpressUser
Outputs:
  RegularUser:
    Value: !Ref RegularUser
  ExpressUser:
    Value: !Ref ExpressUser
